name: CI

on:
  push:
    branches: [main, fix/*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: running_coach
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: running_coach
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      
      - name: Check imports
        run: |
          python -c "from src.startup import create_app; print('OK')"
      
      - name: Check forbidden patterns
        run: |
          ! grep -rn "from src.database" src/
          ! grep -rn "except: pass" src/
          ! grep -rn "os.environ.setdefault" src/
      
      - name: Run tests
        env:
          DATABASE_URL: postgresql://running_coach:test_password@localhost:5432/running_coach
          SECRET_KEY: test_secret_key_for_ci
          FERNET_KEY: test_fernet_key_for_ci
        run: |
          python -m pytest tests/ -v --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: |
          docker compose build app
      
      - name: Verify Docker image
        run: |
          docker compose up -d db
          sleep 5
          docker compose up -d app
          sleep 10
          curl -f http://localhost:8000/health/ || exit 1
          docker compose down
