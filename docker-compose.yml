services:
  # === PostgreSQL база данных (PostgreSQL database) ===
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: running_coach
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: running_coach
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U running_coach"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: on-failure

  # === FastAPI веб-приложение (FastAPI web application) ===
  app:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://running_coach:${POSTGRES_PASSWORD}@db:5432/running_coach
      PENDING_DIR: /tmp/running_coach_uploads
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  # === Telegram-бот (Telegram bot) ===
  bot:
    build: .
    command: python run_telegram_bot.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql://running_coach:${POSTGRES_PASSWORD}@db:5432/running_coach
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  pgdata: