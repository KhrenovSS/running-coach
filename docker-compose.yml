services:
  # === PostgreSQL база данных (PostgreSQL database) ===
  db:
    image: postgres:16-alpine
    # Порт открыт только для внутренней сети Docker.
    # Для локальной разработки раскомментируйте:
    #ports:
    #  - "5432:5432"
    environment:
      POSTGRES_USER: running_coach
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: running_coach
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U running_coach"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: on-failure

  # === FastAPI веб-приложение (FastAPI web application) ===
  app:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://running_coach:${POSTGRES_PASSWORD}@db:5432/running_coach
      TZ: Europe/Moscow
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: on-failure

  # === Telegram-бот (Telegram bot) ===
  bot:
    build: .
    command: python run_telegram_bot.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql://running_coach:${POSTGRES_PASSWORD}@db:5432/running_coach
      TZ: Europe/Moscow
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U running_coach -h db || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: on-failure

volumes:
  pgdata: